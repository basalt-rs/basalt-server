permissions:
    contents: read
    packages: write

on:
    workflow_dispatch:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+.?*"

concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true

name: delivery

jobs:
    get-version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.extract.outputs.version }}
        steps:
            - name: Extract version from ref
              id: extract
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

    build:
        needs: get-version
        strategy:
            matrix:
                arch: [amd64, arm64]
        runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
        env:
            VERSION: ${{ needs.get-version.outputs.version }}
        steps:
            - uses: actions/checkout@v4

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & push (${{ matrix.arch }})
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: ${{ matrix.arch == 'amd64' && 'linux/amd64' || 'linux/arm64' }}
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/basalt-server:${{ needs.get-version.outputs.version }}-${{ matrix.arch }}

    manifest:
        needs: [get-version, build]
        runs-on: ubuntu-24.04
        env:
            VERSION: ${{ needs.get-version.outputs.version }}
        steps:
            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create and push multi-arch manifest
              run: |
                  CLEAN_VERSION="${VERSION#v}"
                  MAJOR=$(echo "$CLEAN_VERSION" | cut -d. -f1)
                  MINOR=$(echo "$CLEAN_VERSION" | cut -d. -f2)

                  IMAGE="ghcr.io/${{ github.repository_owner }}/basalt-server"
                  AMD64="$IMAGE:$CLEAN_VERSION-amd64"
                  ARM64="$IMAGE:$CLEAN_VERSION-arm64"

                  if [[ "$CLEAN_VERSION" =~ -(rc|alpha|beta) ]]; then
                    TAGS=("$CLEAN_VERSION")
                  else
                    TAGS=("latest" "$CLEAN_VERSION" "$MAJOR.$MINOR.X" "$MAJOR.X.X")
                  fi

                  for TAG in "${TAGS[@]}"; do
                    echo "Creating manifest for $IMAGE:$TAG..."
                    docker buildx imagetools create -t "$IMAGE:$TAG" "$AMD64" "$ARM64"
                  done
